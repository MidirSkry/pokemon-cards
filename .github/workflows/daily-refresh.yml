name: Daily Price Refresh

on:
  schedule:
    # Runs at 6am UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Redeploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
